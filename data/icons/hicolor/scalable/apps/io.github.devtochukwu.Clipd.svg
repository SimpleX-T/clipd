<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3584e4"/>
      <stop offset="1" stop-color="#1a5fb4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="20" y="20" width="216" height="216" rx="48" ry="48" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <!-- Clipboard body -->
    <rect x="68" y="78" width="120" height="134" rx="14" ry="14" fill="#ffffff" fill-opacity="0.97"/>
    <!-- Clipboard clip -->
    <rect x="104" y="56" width="48" height="32" rx="8" ry="8" fill="#ffffff" fill-opacity="0.97"/>
    <rect x="114" y="64" width="28" height="14" rx="4" ry="4" fill="#1a5fb4"/>
  </g>

  <!-- History rows -->
  <rect x="84" y="106" width="88" height="11" rx="4" ry="4" fill="#1a5fb4" fill-opacity="0.9"/>
  <rect x="84" y="126" width="72" height="11" rx="4" ry="4" fill="#1a5fb4" fill-opacity="0.32"/>
  <rect x="84" y="146" width="80" height="11" rx="4" ry="4" fill="#1a5fb4" fill-opacity="0.32"/>

  <!-- Emoji palette dots -->
  <circle cx="92"  cy="184" r="9" fill="#f6d32d"/>
  <circle cx="116" cy="184" r="9" fill="#33d17a"/>
  <circle cx="140" cy="184" r="9" fill="#ed333b"/>
  <circle cx="164" cy="184" r="9" fill="#c061cb"/>
</svg>
